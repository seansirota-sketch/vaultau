# ============================================================
# netlify.toml  —  שים קובץ זה בשורש הפרויקט שלך
# ============================================================

[build]
  # תיקיית הפונקציות — Netlify יאסוף מכאן אוטומטית
  functions = "netlify/functions"

  # תיקיית ה-publish (הקבצים הסטטיים שלך — index.html וכו')
  publish = "."

  # ── ביטול סריקת סודות — מפתח Firebase הוא ציבורי ומוגן ע"י Security Rules ──
  [build.environment]
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ── Headers לאבטחה על כל הדפים ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Function timeouts ──
# parse-exam-background: auto 15min (background function — suffix -background)
# parse-result: lightweight polling endpoint (default 10s is fine)
# parse-exam: kept as fallback (26s max on Pro)
[functions]
  node_bundler = "esbuild"

  [functions.parse-exam]
    timeout = 26

  [functions.parse-result]
    timeout = 10
