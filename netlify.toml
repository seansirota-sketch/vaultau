# ============================================================
# netlify.toml  —  שים קובץ זה בשורש הפרויקט שלך
# ============================================================

[build]
  # תיקיית הפונקציות — Netlify יאסוף מכאן אוטומטית
  functions = "netlify/functions"

  # תיקיית ה-publish (הקבצים הסטטיים שלך — index.html וכו')
  publish = "."

  # ── ביטול סריקת סודות — מפתח Firebase הוא ציבורי ומוגן ע"י Security Rules ──
  [build.environment]
    SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# ── Headers לאבטחה על כל הדפים ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Function timeouts ──
[functions]
  node_bundler = "esbuild"

  [functions.parse-result]
    timeout = 10

# ── Edge Functions ──
[[edge_functions]]
  path = "/api/generate-question"
  function = "generate-question"

[[edge_functions]]
  path = "/api/parse-exam"
  function = "parse-exam"
